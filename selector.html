<!DOCTYPE html>
<html>

<head>
    <meta charset="UTF-8">
    <style>
        body {
            margin: 0;
            padding: 0;
            width: 100vw;
            height: 100vh;
            background: transparent;
            overflow: hidden;
            cursor: crosshair;
        }

        #overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.2);
            /* 選択前は少し暗く */
            transition: background 0.3s;
        }

        #selection-box {
            position: absolute;
            border: 2px solid #ff4081;
            background: transparent;
            /* 中は完全に透明に */
            display: none;
            pointer-events: none;
            box-shadow: 0 0 0 9999px rgba(0, 0, 0, 0.3);
            /* 枠外を暗くする */
        }

        .guide-text {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            color: white;
            font-family: sans-serif;
            font-size: 24px;
            font-weight: bold;
            text-shadow: 0 2px 10px rgba(0, 0, 0, 0.5);
            pointer-events: none;
            text-align: center;
        }

        /* 確定後のスタイル */
        body.selected #overlay {
            background: transparent;
            pointer-events: none;
            /* 確定後はクリックを透過 */
        }

        body.selected .guide-text {
            display: none;
        }

        body.selected #selection-box {
            box-shadow: none;
            /* 確定後は枠外の暗転を解除して視認性確保 */
            background: rgba(255, 64, 129, 0.05);
            /* ほんの少しだけ色をつけて「ここが対象」と示す */
        }

        /* 認識済みハイライトのスタイル */
        .highlight {
            position: absolute;
            background: rgba(0, 120, 255, 0.25);
            border: 1px solid rgba(0, 120, 255, 0.4);
            pointer-events: none;
            border-radius: 2px;
            z-index: 10;
            transition: opacity 0.5s ease;
        }
    </style>
</head>

<body>
    <div id="overlay"></div>
    <div class="guide-text" id="guide">ドラッグして読み取り範囲を選択<br><span
            style="font-size: 14px; font-weight: normal;">(Escでキャンセル)</span></div>
    <div id="selection-box"></div>

    <script>
        const { ipcRenderer } = require('electron');
        const box = document.getElementById('selection-box');
        const guide = document.getElementById('guide');
        const body = document.body;

        let startX, startY, isDragging = false;

        window.addEventListener('mousedown', (e) => {
            if (body.classList.contains('selected')) return; // 確定後は無視

            isDragging = true;
            startX = e.clientX;
            startY = e.clientY;
            box.style.left = startX + 'px';
            box.style.top = startY + 'px';
            box.style.width = '0px';
            box.style.height = '0px';
            box.style.display = 'block';
            guide.style.display = 'none';
        });

        window.addEventListener('mousemove', (e) => {
            if (!isDragging) return;

            const currentX = e.clientX;
            const currentY = e.clientY;

            const left = Math.min(startX, currentX);
            const top = Math.min(startY, currentY);
            const width = Math.abs(currentX - startX);
            const height = Math.abs(currentY - startY);

            box.style.left = left + 'px';
            box.style.top = top + 'px';
            box.style.width = width + 'px';
            box.style.height = height + 'px';
        });

        window.addEventListener('mouseup', (e) => {
            if (!isDragging) return;
            isDragging = false;

            const rect = box.getBoundingClientRect();
            if (rect.width > 20 && rect.height > 20) {
                // 確定状態にする
                body.classList.add('selected');

                // 座標をメインプロセスに送信
                ipcRenderer.send('set-selection-range', {
                    x: Math.round(rect.left),
                    y: Math.round(rect.top),
                    width: Math.round(rect.width),
                    height: Math.round(rect.height)
                });
            }
        });

        // メインプロセス側でキャンセルされた際のリセット
        ipcRenderer.on('reset-selector', () => {
            body.classList.remove('selected');
            box.style.display = 'none';
            guide.style.display = 'block';
        });

        window.addEventListener('keydown', (e) => {
            if (e.key === 'Escape') {
                ipcRenderer.send('cancel-selection');
            }
        });

        // 認識済みハイライトの描画
        ipcRenderer.on('draw-highlights', (event, boxes) => {
            if (!body.classList.contains('selected')) return;

            // 古いハイライトを消去（一定時間で消えるようにしても良いが、一旦全消し）
            // スクロールに追従させるため、既存のものをクリアして新しい座標で描画
            const existing = document.querySelectorAll('.highlight');
            existing.forEach(el => el.remove());

            boxes.forEach(b => {
                const h = document.createElement('div');
                h.className = 'highlight';
                h.style.left = b.x + 'px';
                h.style.top = b.y + 'px';
                h.style.width = b.width + 'px';
                h.style.height = b.height + 'px';
                document.body.appendChild(h);

                // 2秒後にフェードアウト
                setTimeout(() => {
                    h.style.opacity = '0';
                    setTimeout(() => h.remove(), 500);
                }, 1500);
            });
        });
    </script>
</body>

</html>
