<!DOCTYPE html>
<html>

<head>
    <meta charset="UTF-8">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap');

        body {
            margin: 0;
            padding: 0;
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: transparent;
            overflow: hidden;
            color: #fff;
        }

        .container {
            width: 100%;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: flex-start;
            padding-top: 15vh;
        }

        .search-box {
            width: 600px;
            background: rgba(18, 18, 20, 0.75);
            border-radius: 28px;
            box-shadow: 0 24px 64px rgba(0, 0, 0, 0.6), inset 0 1px 1px rgba(255, 255, 255, 0.15);
            backdrop-filter: blur(50px) saturate(200%);
            -webkit-backdrop-filter: blur(50px) saturate(200%);
            display: flex;
            flex-direction: column;
            position: relative;
        }

        /* SFチックでスタイリッシュな上部グラデーションバー */
        .search-box::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 4px;
            background: linear-gradient(90deg, #00C6FF, #0072FF, #8A2387, #E94057, #F27121);
            background-size: 200% 100%;
            animation: gradientMove 4s ease infinite;
            border-top-left-radius: 28px;
            border-top-right-radius: 28px;
            z-index: 10;
        }

        @keyframes gradientMove {
            0% {
                background-position: 0% 50%;
            }

            50% {
                background-position: 100% 50%;
            }

            100% {
                background-position: 0% 50%;
            }
        }

        .input-wrapper {
            padding: 16px 28px;
            display: flex;
            align-items: center;
            background: rgba(0, 0, 0, 0.2);
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: 28px 28px 0 0;
        }

        input {
            width: 100%;
            background: transparent;
            border: none;
            padding: 12px 0;
            font-size: 32px;
            font-weight: 600;
            color: #ffffff;
            outline: none;
            letter-spacing: -0.5px;
        }

        input::placeholder {
            color: rgba(255, 255, 255, 0.2);
            font-weight: 500;
        }

        #results {
            max-height: 280px;
            overflow-y: auto;
            padding: 12px 16px;
        }

        .item {
            padding: 14px 20px;
            font-size: 19px;
            font-weight: 500;
            color: rgba(255, 255, 255, 0.6);
            cursor: pointer;
            border-radius: 14px;
            margin-bottom: 4px;
            transition: all 0.15s ease;
            word-break: break-all;
            line-height: 1.4;
        }

        .item:hover {
            background: rgba(255, 255, 255, 0.05);
            color: rgba(255, 255, 255, 0.9);
        }

        .item.selected {
            background: linear-gradient(135deg, rgba(85, 128, 255, 0.3), rgba(153, 51, 255, 0.3));
            color: #ffffff;
            box-shadow: inset 0 0 0 1px rgba(255, 255, 255, 0.15);
            transform: scale(1.01);
            font-weight: 600;
        }

        /* スクロールバー非表示 */
        ::-webkit-scrollbar {
            display: none;
        }
    </style>
</head>

<body>
    <div class="container">
        <div class="search-box">
            <div class="input-wrapper">
                <input type="text" id="searchInput" placeholder="Magic Autocomplete..." autofocus autocomplete="off">
                <div id="modeBadge"
                    style="display: none; padding: 4px 10px; background: rgba(255, 64, 129, 0.2); border: 1px solid rgba(255, 64, 129, 0.4); border-radius: 8px; font-size: 12px; font-weight: 600; color: #ff4081; margin-left: 12px; white-space: nowrap;">
                    集中モード</div>
            </div>
            <div id="results"></div>
        </div>
    </div>
    <script src="renderer.js"></script>
</body>

</html>
