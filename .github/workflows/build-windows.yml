name: Build Windows Installer

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: 20
        cache: 'npm'
        cache-dependency-path: package.json

    - name: Install dependencies
      run: npm install

    - name: Setup MSBuild (csc)
      uses: microsoft/setup-msbuild@v2

    - name: Install WinRT SDK Contracts via NuGet
      run: |
        nuget install Microsoft.Windows.SDK.Contracts -Version 10.0.19041.1 -OutputDirectory nuget

    - name: Compile Native Windows OCR (ocr.exe)
      run: |
        $contractPath = Get-ChildItem -Path "nuget\Microsoft.Windows.SDK.Contracts*\lib\netstandard2.0\Microsoft.Windows.SDK.Contracts.dll" | Select-Object -First 1 -ExpandProperty FullName
        csc /target:exe /out:ocr.exe ocr.cs /reference:System.Drawing.dll /reference:System.Runtime.WindowsRuntime.dll /reference:"$contractPath"
      shell: powershell

    - name: Build Electron Installer (.exe)
      run: npm run build:win
      env:
        GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

    - name: Upload Installer Artifact
      uses: actions/upload-artifact@v4
      with:
        name: AutoComp-Windows-Installer
        path: dist/*.exe
