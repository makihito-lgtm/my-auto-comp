name: Build Windows Installer

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: 20
        cache: 'npm'
        cache-dependency-path: package.json

    - name: Install dependencies
      run: npm install

    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: 6.0.x

    - name: Compile Native Windows OCR (ocr.exe)
      run: |
        dotnet publish AutoCompOCR.csproj -c Release -r win-x64 --self-contained true -p:PublishSingleFile=true -o .
        move-item AutoCompOCR.exe ocr.exe
      shell: powershell

    - name: Build Electron Installer (.exe)
      run: npm run build:win
      env:
        GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

    - name: Upload Installer Artifact
      uses: actions/upload-artifact@v4
      with:
        name: AutoComp-Windows-Installer
        path: dist/*.exe
